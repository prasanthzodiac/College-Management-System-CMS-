# Render Blueprint: set repo root when connecting GitHub. API lives in /backend.
services:
  - type: web
    name: cms-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
